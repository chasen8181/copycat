apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "copycat.fullname" . }}
  labels:
    {{- include "copycat.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy.type }}
  selector:
    matchLabels:
      {{- include "copycat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/auth-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "copycat.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "copycat.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: copycat
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: PUID
              value: {{ .Values.runtime.puid | quote }}
            - name: PGID
              value: {{ .Values.runtime.pgid | quote }}
            - name: COPYCAT_HOST
              value: "0.0.0.0"
            - name: COPYCAT_PORT
              value: {{ .Values.containerPort | quote }}
            - name: COPYCAT_PATH
              value: {{ .Values.persistence.mountPath | quote }}
            - name: COPYCAT_AUTH_TYPE
              value: {{ .Values.auth.type | quote }}
            {{- if .Values.pathPrefix }}
            - name: COPYCAT_PATH_PREFIX
              value: {{ .Values.pathPrefix | quote }}
            {{- end }}
            {{- if or (eq .Values.auth.type "password") (eq .Values.auth.type "totp") }}
            - name: COPYCAT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "copycat.authSecretName" . }}
                  key: COPYCAT_USERNAME
            - name: COPYCAT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "copycat.authSecretName" . }}
                  key: COPYCAT_PASSWORD
            - name: COPYCAT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "copycat.authSecretName" . }}
                  key: COPYCAT_SECRET_KEY
            {{- if eq .Values.auth.type "totp" }}
            - name: COPYCAT_TOTP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "copycat.authSecretName" . }}
                  key: COPYCAT_TOTP_KEY
            {{- end }}
            {{- end }}
            {{- range $name, $value := .Values.config }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ include "copycat.probePath" . }}
              port: {{ .Values.startupProbe.httpGet.port }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ include "copycat.probePath" . }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ include "copycat.probePath" . }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
              {{- if .Values.persistence.subPath }}
              subPath: {{ .Values.persistence.subPath }}
              {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (include "copycat.fullname" .) .Values.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
