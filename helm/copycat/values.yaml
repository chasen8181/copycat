replicaCount: 1

nameOverride: ""
fullnameOverride: ""

controller:
  type: Deployment

image:
  repository: copycat
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

strategy:
  type: Recreate

runtime:
  puid: 1000
  pgid: 1000

containerPort: 8080
pathPrefix: ""

auth:
  type: password
  existingSecret: ""
  username: admin
  password: changeMe!
  secretKey: change-this-secret-before-production
  totpKey: ""

config: {}

extraEnv: []
extraEnvFrom: []
extraVolumes: []
extraVolumeMounts: []

service:
  type: ClusterIP
  port: 80
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: copycat.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  existingClaim: ""
  volumeClaimTemplate:
    enabled: false
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  mountPath: /data
  subPath: ""
  annotations: {}

statefulSet:
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate

resources: {}

podSecurityContext: {}
containerSecurityContext: {}

startupProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 30

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 6

nodeSelector: {}
tolerations: []
affinity: {}
